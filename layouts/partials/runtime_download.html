{{ $path := .path }}
{{ $label := .label | default "Download file" }}

<div class="runtime-download-container" data-runtime-download-container hidden>
  <a
    class="runtime-download-button"
    href="{{ $path }}"
    data-runtime-download-url="{{ $path }}"
    target="_blank"
    rel="noopener noreferrer"
    role="button"
  >
    <i class="fa-solid fa-file-arrow-down" aria-hidden="true"></i>
    <span>{{ $label }}</span>
  </a>
</div>
